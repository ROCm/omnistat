name: Unit tests
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip3 install -r requirements.txt -r test/requirements.txt
      - name: Run unit tests
        run: pytest -v test/test_kernel_trace.py
